<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("fondo1.jpg") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 15px;
            color: white;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 20px #00bcd4;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00bcd4;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form onsubmit="login(event)">
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button type="submit">Entrar</button>
    </form>

    <br>

    <button onclick="adminAccess()">Panel Admin 💻</button>
</div>

<script>
function login(e) {
    e.preventDefault();

    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    const users = JSON.parse(localStorage.getItem("users")) || [];

    const encontrado = users.find(u => u.user === user && u.pass === pass);

    if (encontrado) {
        localStorage.setItem("usuario", user);
        window.location.href = "panel.html";
    } else {
        alert("Usuario o contraseña incorrectos");
    }
}

/* 🔐 ACCESO ADMIN */
function adminAccess() {
    const clave = prompt("Contraseña admin:");

    if (clave === "itachi") {
        window.location.href = "admin.html";
    } else {
        alert("Acceso denegado");
    }
}
</script>

</body>
</html>
