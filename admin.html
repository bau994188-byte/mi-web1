<!DOCTYPE html>
<html>
<head>
    <title>Admin</title>

    <style>
        body {
            background: black;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
        }

        #output {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        input {
            background: black;
            color: #00ff00;
            border: none;
            outline: none;
            width: 100%;
            font-family: monospace;
        }
    </style>
</head>
<body>

<h2>root@system:~#</h2>

<div id="output"></div>

<span>> </span><input type="text" id="cmd" autofocus>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

const input = document.getElementById("cmd");
const output = document.getElementById("output");

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        ejecutar(input.value);
        input.value = "";
    }
});

function ejecutar(cmd) {
    log("> " + cmd);

    const partes = cmd.split(" ");

    if (partes[0] === "crear") {
        const user = partes[1];
        const pass = partes[2];

        users.push({ user, pass });
        localStorage.setItem("users", JSON.stringify(users));

        log("✔ Usuario creado: " + user);
    }

    else if (partes[0] === "listar") {
        users.forEach(u => log("- " + u.user));
    }

    else if (partes[0] === "clear") {
        output.innerHTML = "";
    }

    else {
        log("✖ Comando no reconocido");
    }
}

function log(texto) {
    const p = document.createElement("p");
    p.innerText = texto;
    output.appendChild(p);
    output.scrollTop = output.scrollHeight;
}
</script>

</body>
</html>
